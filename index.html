    <style>
      body {

        margin: 0;
        padding: 32px 20px;

        font-size: 14px;
      }
    </style>

  <body>
    <main>
      <h1>HowToCook（图片版）</h1>
      <p>按分类浏览菜谱目录页（每道菜附图）。</p>
      <ul id="menu-list">
        <li><a data-path="menus/vegetable_dish.md" href="menus/vegetable_dish.md">素菜</a></li>
        <li><a data-path="menus/meat_dish.md" href="menus/meat_dish.md">荤菜</a></li>

      </ul>
      <p class="hint">
        如果你希望在 Pages 里直接渲染 Markdown（而不是跳转到 GitHub 页面渲染），告诉我你想用的静态站点方案
        （Jekyll / MkDocs / VitePress 等），我可以把部署流程补齐。
      </p>
    </main>
    <script>
      (function () {
        var host = window.location.hostname;
        var pathParts = window.location.pathname.replace(/^\/+/, "").split("/");
        var repoName = pathParts[0] || "";
        var owner = host.endsWith(".github.io") ? host.slice(0, -".github.io".length) : "";
        var githubBase = owner && repoName ? "https://github.com/" + owner + "/" + repoName + "/blob/main/" : "";
        if (!githubBase) return;

        var links = document.querySelectorAll("a[data-path]");
        for (var i = 0; i < links.length; i++) {
          var p = links[i].getAttribute("data-path");
          if (p) links[i].setAttribute("href", githubBase + p);
        }
      })();
    </script>
  </body>
