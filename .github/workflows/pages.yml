name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      
      - name: Restore LFS cache
        uses: actions/cache@v4
        with:
          path: .git/lfs/objects
          key: lfs-${{ runner.os }}-${{ github.ref_name }}-v1
          restore-keys: |
            lfs-${{ runner.os }}-${{ github.ref_name }}-
            lfs-${{ runner.os }}-
      
      - name: Setup Git LFS and pull assets
        run: |
          git lfs install
          git lfs pull
      
      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Generate recipe data
        run: pnpm run generate-recipes

      - name: Build
        run: pnpm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
